<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=#">
    <title>Out of Erbium</title>
    <script>
        // List of URLs
        const urls = [
            "https://www.youtube.com/live/aMojzTRVbJM",
            "https://openai.com",
            "https://github.com"
        ];

        // Pick a random URL
        const randomUrl = urls[Math.floor(Math.random() * urls.length)];

        // Redirect
        window.location.href = randomUrl;
    </script>
</head>
<body>
    <p>Redirecting… if you are not redirected, <a id="redirectLink" href="#">click here</a>.</p>
    <script>
        document.getElementById("redirectLink").href = randomUrl;
    </script>
</body>
</html>
